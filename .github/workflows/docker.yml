name: docker

on:
  push:
    paths:
      - Dockerfile
      - docker-compose.yml
      - .dockerignore
      - server/**
      - lua/**
      - .github/workflows/docker.yml
  pull_request:
    paths:
      - Dockerfile
      - docker-compose.yml
      - .dockerignore
      - server/**
      - lua/**
      - .github/workflows/docker.yml

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: chatcc:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Validate the suite against the exact runtime environment (pinned deps,
      # Debian bookworm) rather than the runner's system packages.
      - name: Run test suite inside the image
        run: |
          docker run --rm -w /app/server chatcc:ci \
            sh -c "pip install --no-cache-dir pytest && pytest -q -m 'not youtube'"
